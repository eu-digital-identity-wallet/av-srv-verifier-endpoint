# Enables logging of Mongo mapping events
logging.level.org.springframework=INFO
logging.level.org.springframework.boot.actuate.endpoint.web=INFO

management.endpoints.access.default=read_only
spring.web.error.include-stacktrace=ALWAYS
server.port=8080
spring.webflux.static-path-pattern=/public/**
spring.webflux.webjars-path-pattern=/webjars/**
spring.messages.basename=i18n/messages

#
# Verifier options
#
verifier.originalClientId=Verifier
verifier.clientIdPrefix=pre-registered
verifier.access-certificate.signing-algorithm=ES512
verifier.access-certificate.keystore=classpath:keystore.jks
verifier.access-certificate.keystore.type=jks
verifier.access-certificate.keystore.password=keystore
verifier.access-certificate.alias=access_certificate
verifier.access-certificate.password=access_certificate
verifier.publicUrl=http://localhost:${server.port}
verifier.requestJwt.embed=ByValue
verifier.requestJwt.requestUriMethod=Get
verifier.response.mode=DirectPost
verifier.maxAge=PT6400M
verifier.presentations.cleanup.maxAge=P10D
verifier.authorizationRequestUri=haip-vp://
verifier.allowedRedirectUriSchemes=https

# clientMetadata parameters
verifier.clientMetadata.vpFormats.sdJwtVc.enabled=true
verifier.clientMetadata.vpFormats.sdJwtVc.sdJwtAlgorithms=ES256,ES384,ES512
verifier.clientMetadata.vpFormats.sdJwtVc.kbJwtAlgorithms=RS256,RS384,RS512,ES256,ES384,ES512
verifier.clientMetadata.vpFormats.msoMdoc.enabled=true
verifier.clientMetadata.responseEncryption.algorithm=ECDH-ES
verifier.clientMetadata.responseEncryption.methods=A128CBC-HS256

#
# Configuration parameters for validations applied by verifier
# to wallet presentations or in utilities api
#
verifier.validation.sdJwtVc.statusCheck.enabled=true

# Status List SSRF protection (applies to SD-JWT VC and mso_mdoc status checks).
# The status_list.uri comes from the wallet-presented credential, so outgoing fetches are guarded:
# only https, optional host allow-list, private/loopback/link-local/metadata addresses are rejected,
# redirects are disabled by default, and connect/request/socket timeouts + a response size cap apply.
verifier.validation.statusList.ssrf.enabled=true
#verifier.validation.statusList.ssrf.allowHttp=false
#verifier.validation.statusList.ssrf.allowedHosts=status.example.com,issuer.example.org
#verifier.validation.statusList.followRedirects=false
#verifier.validation.statusList.http.connectTimeout=PT5S
#verifier.validation.statusList.http.requestTimeout=PT10S
#verifier.validation.statusList.http.socketTimeout=PT10S
#verifier.validation.statusList.http.maxResponseBytes=1048576

# mso_mdoc device-auth handover compatibility:
# Enable ONLY for OpenID4VP 1.0 wallets that use the redirect_uri client identifier prefix
# (e.g. the EUDI/av wallet). Incompatible with pre-registered / x509 wallets. Default: false.
verifier.mdoc.redirectUriClientIdInDeviceAuthHandover=true

# Always-accept mode:
# When true, the verifier never rejects a well-formed wallet response on validation grounds. Every
# check runs in collect-all mode, the submission is always accepted (HTTP 200), and a per-check
# TrustInfo report is attached and exposed via get-wallet-response (field "trust_info"). Default: false.
verifier.alwaysAcceptWalletResponse=true

# transaction data
verifier.transactionData.hashAlgorithm=sha-256

# cors
cors.origins=*
cors.originPatterns=*
cors.methods=*
cors.headers=*
cors.credentials=false
cors.maxAge=3600

# Trust Validator Service Configuration
# Set the trust-validator '/trust' URL (e.g. via VERIFIER_TRUSTVALIDATOR_SERVICEURL) to enable issuer
# trust verification. When unset, all Verifiable Credential issuers are considered trusted.
#verifier.trustValidator.serviceUrl=http://localhost:8080/trust

# Attestation Classifications
verifier.attestation-classifications={"pid":{"vcts":["urn:eudi:pid:1"],"docTypes":["eu.europa.ec.eudi.pid.1"]},"qeaa":{"vcts":[],"docTypes":[]},"pubeaa":{"vcts":["urn:eudi:ehic:1"],"docTypes":[]},"eaa":[{"useCase":"age-verification","vcts":[],"docTypes":["eu.europa.ec.av.1"]},{"useCase":"mDL","vcts":[],"docTypes":["org.iso.18013.5.1.mDL"]},{"useCase":"learningCredential","vcts":["urn:eu.europa.ec.eudi:learning:credential:1"],"docTypes":[]}]}

# Proxy settings
#verifier.http.proxy.url=http://example.com
#verifier.http.proxy.username=test
#verifier.http.proxy.password=test

# SD-JWT-VC Validation configuration
verifier.validation.sdJwtVc.kbJwt.clock.skew=PT5S

verifier.validation.sdJwtVc.typeMetadata.policy=not-used
#verifier.validation.sdJwtVc.typeMetadata.policy.requiredFor=urn:eudi:pid:1

# SD-JWT VC Type Metadata resolution
verifier.validation.sdJwtVc.typeMetadata.resolution.cache.ttl=PT1H
verifier.validation.sdJwtVc.typeMetadata.resolution.cache.maxEntries=10
verifier.validation.sdJwtVc.typeMetadata.resolution.integrity.enabled=false
verifier.validation.sdJwtVc.typeMetadata.resolution.integrity.allowedAlgorithms=sha256,sha384,sha512
#verifier.validation.sdJwtVc.typeMetadata.resolution.vcts[0].vct=urn:eudi:pid:1
#verifier.validation.sdJwtVc.typeMetadata.resolution.vcts[0].url=https://dev.issuer-backend.eudiw.dev/type-metadata/urn:eudi:pid:1

